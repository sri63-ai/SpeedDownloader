<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SpeedDownloader - Fast & Smart</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #0f0c1b;
            --card: #1a162e;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 { color: var(--primary); margin-bottom: 25px; }
        
        /* Navigation Tabs Style */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #251f47;
            padding: 5px;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #a29bfe;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
            flex: 1;
            min-width: 80px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #251f47;
            background: #120e24;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            outline: none;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #5649c1; }
        #status { margin-top: 15px; font-weight: bold; }
        .footer-links { margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #a29bfe; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">⚡ Facebook Video Downloader</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('facebook')">Facebook</button>
        <button class="tab-btn" onclick="switchTab('instagram')">Instagram</button>
        <button class="tab-btn" onclick="switchTab('youtube')">YouTube</button>
        <button class="tab-btn" onclick="switchTab('tiktok')">TikTok</button>
        <button class="tab-btn" onclick="switchTab('twitter')">Twitter</button>
        <button class="tab-btn" onclick="switchTab('other')">Other</button>
    </div>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Please paste your Facebook video link here...">
        <button class="btn" onclick="startDownload()">Get Download Link</button>
    </div>

    <div id="status"></div>

    <div class="footer-links">
        <a href="/terms">Terms of Service & Privacy Policy</a>
    </div>
</div>

<script>
    let currentPlatform = 'facebook';

    // Function to handle Tab Switching
    function switchTab(platform) {
        currentPlatform = platform;
        
        // Update active tab styling
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // Update Title and Placeholder dynamically
        const mainTitle = document.getElementById('mainTitle');
        const urlInput = document.getElementById('videoUrl');
        const statusDiv = document.getElementById('status');
        
        statusDiv.innerHTML = ""; // Clear previous messages
        urlInput.value = ""; // Clear input box
        
        let displayPlatform = platform.charAt(0).toUpperCase() + platform.slice(1);
        mainTitle.innerText = `⚡ ${displayPlatform} Video Downloader`;
        urlInput.placeholder = `Please paste your ${displayPlatform} video link here...`;
    }

    async function startDownload() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const statusDiv = document.getElementById('status');
        
        if (!urlInput) {
            statusDiv.innerHTML = "<p style='color: #ff7675;'>URL cannot be empty!</p>";
            return;
        }

        statusDiv.innerHTML = "<p style='color: #f1c40f;'>Fetching download link, please wait...</p>";

        try {
            const formData = new FormData();
            formData.append('url', urlInput);

            const response = await fetch('/get_download_link', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success && data.download_url) {
                statusDiv.innerHTML = `
                    <p style='color: #2ecc71;'>Success: ${data.title}</p>
                    <a href="${data.download_url}" target="_blank" rel="noopener noreferrer">
                        <button class="btn" style="background: #2ecc71; width: 100%; margin-top: 10px;">Click Here to Download Video</button>
                    </a>`;
            } else {
                // If link fails, show the custom error message you requested
                statusDiv.innerHTML = "<p style='color: #ff7675;'>❌ This link is not supported, Please try agin other links.</p>";
            }
        } catch (error) {
            statusDiv.innerHTML = "<p style='color: #ff7675;'>❌ This link is not working. Please try again after some time or try other social media links.</p>";
        }
    }
</script>

</body>
</html>
