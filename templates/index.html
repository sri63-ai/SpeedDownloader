<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Lightning Fast Video Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }
        h1 { margin-bottom: 10px; font-size: 28px; }
        p { color: #ddd; margin-bottom: 30px; }
        input[type="text"] {
            width: 90%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button {
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,198,255,0.4); }
        .status-msg { margin-top: 15px; font-weight: bold; color: #00c6ff; }
        .legal-footer {
            max-width: 600px;
            text-align: center;
            font-size: 12px;
            color: #ccc;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }
        .legal-footer a { color: #00c6ff; text-decoration: none; font-weight: bold; }
        .legal-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ SpeedDownloader</h1>
        <p>The Fastest Video Downloader on the Internet</p>
        <input type="text" id="videoUrl" placeholder="Paste your YouTube/FB/Insta link here..." required>
        <button onclick="startDownload()">Download Video Instantly</button>
        <div class="status-msg" id="status"></div>
    </div>

    <div class="legal-footer">
        <strong>Disclaimer & Terms of Service:</strong><br>
        This website is strictly intended for personal use only. We do not host or store any videos on our servers. By using this tool, you agree to our <a href="/terms" target="_blank">Terms & Conditions</a>.
    </div>

    <script>
        async function startDownload() {
            const urlInput = document.getElementById('videoUrl').value;
            const statusDiv = document.getElementById('status');
            
            if(!urlInput) {
                statusDiv.innerText = "Please paste a valid link!";
                return;
            }

            statusDiv.innerText = "⚡ Fetching high-speed download link... Please wait...";

            try {
                let formData = new FormData();
                formData.append('url', urlInput);

                let response = await fetch('/get_download_link', {
                    method: 'POST',
                    body: formData
                });
                
                let data = await response.json();

                if(data.success) {
                    statusDiv.innerText = "🎉 Downloading started...";
                    
                    const a = document.createElement('a');
                    a.href = data.download_url;
                    a.download = data.title + ".mp4";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    statusDiv.innerText = "❌ Error: " + data.error;
                }
            } catch (error) {
                statusDiv.innerText = "❌ Connection failed. Try again.";
            }
        }
        <div class="contact-box">
    <strong>Contact & Feedback:</strong><br>
    For business inquiries, advertisements, or feedback, please email us at: <a href="mailto:support@speeddownloader.in"><strong>support@speeddownloader.in</strong></a>
</div>
    </script>
</body>
</html>
